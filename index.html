<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2d9e5f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Groceries" />
  <meta name="description" content="Simple offline grocery list" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/style.css" />

  <title>Grocery List</title>
</head>
<body>
  <header>
    <h1>Grocery List</h1>
    <p class="subtitle" id="summary">Loading…</p>
    <form id="add-form" class="add-bar">
      <input
        id="add-input"
        type="text"
        placeholder='Add item… e.g. "Milk x2"'
        autocomplete="off"
        autocorrect="on"
        autocapitalize="sentences"
        enterkeyhint="done"
        maxlength="120"
      />
      <button type="submit" class="btn-add" aria-label="Add item">+</button>
    </form>
  </header>

  <nav class="filters" aria-label="Filter items">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">To buy</button>
    <button class="filter-btn" data-filter="checked">In cart</button>
  </nav>

  <main>
    <div id="empty" class="empty" hidden>
      <div class="icon">🛒</div>
      <p>Add your first item above.</p>
    </div>
    <div id="item-list"></div>
  </main>

  <footer class="fab-bar">
    <button id="btn-clear" class="btn-clear" disabled>Clear checked</button>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
