<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Photo Puzzle" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <title>Photo Puzzle</title>
</head>
<body>

  <!-- Screen 1: Home -->
  <section id="screen-home">
    <header class="app-header">
      <h1>Photo Puzzle</h1>
      <p class="subtitle">Turn any photo into a 3&times;3 puzzle</p>
    </header>
    <main class="home-main">
      <div class="camera-icon" aria-hidden="true">&#128247;</div>
      <label class="btn btn-primary" aria-label="Open camera to take a photo">
        Take Photo
        <input type="file" accept="image/*" capture="environment" id="input-camera" hidden />
      </label>
      <label class="btn btn-secondary" aria-label="Choose a photo from your gallery">
        Choose from Gallery
        <input type="file" accept="image/*" id="input-gallery" hidden />
      </label>
    </main>
  </section>

  <!-- Screen 2: Preview -->
  <section id="screen-preview" hidden>
    <header class="app-header">
      <h1>Preview</h1>
      <p class="subtitle">Your photo will be cropped to a square</p>
    </header>
    <main class="preview-main">
      <canvas id="canvas-preview"></canvas>
    </main>
    <footer class="action-bar">
      <button class="btn btn-secondary" id="btn-retake">Retake</button>
      <button class="btn btn-primary" id="btn-start">Start Puzzle</button>
    </footer>
  </section>

  <!-- Screen 3: Game -->
  <section id="screen-game" hidden>
    <header class="game-header">
      <button class="btn btn-ghost" id="btn-new-game">&#8592; New Game</button>
      <span id="move-counter" aria-live="polite">0 moves</span>
    </header>
    <main class="game-main">
      <div id="puzzle-grid" role="grid" aria-label="Puzzle grid"></div>
    </main>
    <footer class="action-bar">
      <button class="btn btn-secondary" id="btn-peek" aria-label="Hold to see the complete image">
        Hold to Peek &#128065;
      </button>
    </footer>
    <div id="peek-overlay" hidden aria-hidden="true">
      <canvas id="canvas-peek"></canvas>
      <p class="peek-label">Reference</p>
    </div>
  </section>

  <!-- Screen 4: Win -->
  <section id="screen-win" hidden>
    <header class="app-header">
      <h1>&#127881; Solved!</h1>
    </header>
    <main class="win-main">
      <canvas id="canvas-win"></canvas>
      <p id="win-stats" class="win-stats"></p>
      <button class="btn btn-primary" id="btn-play-again">Play Again</button>
    </main>
  </section>

  <script src="app.js"></script>
</body>
</html>
